<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
      @keyframes pulse  { 0%,100%{r:5} 50%{r:7} }
      @keyframes barMS  { from{width:0} to{width:220} }
      @keyframes barMH  { from{width:0} to{width:205} }
      @keyframes barHA  { from{width:0} to{width:190} }
      @keyframes slideR { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
      .g1{animation:fadeUp .7s ease .1s both}
      .g2{animation:fadeUp .7s ease .4s both}
      .g3{animation:slideR .6s ease .6s both}
      .g4{animation:slideR .6s ease .75s both}
      .g5{animation:slideR .6s ease .9s both}
      .g6{animation:fadeUp .7s ease 1.1s both}
      .g7{animation:fadeUp .7s ease 1.7s both}
      .bar-ms{animation:barMS 1s cubic-bezier(.4,0,.2,1) 1.2s both}
      .bar-mh{animation:barMH 1s cubic-bezier(.4,0,.2,1) 1.35s both}
      .bar-ha{animation:barHA 1s cubic-bezier(.4,0,.2,1) 1.5s both}
      .dot{animation:pulse 2s ease-in-out infinite}
    </style>
  </defs>

  <!-- HEADER -->
  <g class="g1">
    <rect x="280" y="22" width="52" height="52" rx="12" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
    <text x="306" y="55" font-size="26" font-weight="700" fill="#3C3489" text-anchor="middle" font-family="monospace">#</text>
    <circle class="dot" cx="332" cy="70" r="5" fill="#1D9E75"/>
    <text x="340" y="52" font-size="22" font-weight="500" fill="#1a1a1a" font-family="sans-serif">Hash Labs</text>
    <text x="340" y="70" font-size="12" fill="#888" font-family="sans-serif">engineering systems, not just code</text>
  </g>

  <!-- TAGS -->
  <g class="g2">
    <rect x="40"  y="96" width="110" height="22" rx="11" fill="#EEEDFE"/>
    <text x="95"  y="111" font-size="11" fill="#3C3489" text-anchor="middle" font-family="sans-serif">Full Stack</text>
    <rect x="160" y="96" width="100" height="22" rx="11" fill="#E1F5EE"/>
    <text x="210" y="111" font-size="11" fill="#085041" text-anchor="middle" font-family="sans-serif">POS Systems</text>
    <rect x="270" y="96" width="100" height="22" rx="11" fill="#FAECE7"/>
    <text x="320" y="111" font-size="11" fill="#712B13" text-anchor="middle" font-family="sans-serif">Mobile Apps</text>
    <rect x="380" y="96" width="118" height="22" rx="11" fill="#E6F1FB"/>
    <text x="439" y="111" font-size="11" fill="#0C447C" text-anchor="middle" font-family="sans-serif">Web Platforms</text>
  </g>

  <line x1="40" y1="132" x2="640" y2="132" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="40" y="155" font-size="11" fill="#aaa" font-family="sans-serif" letter-spacing="1">THE TEAM</text>

  <!-- CARD MS -->
  <g class="g3">
    <rect x="40" y="166" width="185" height="72" rx="10" fill="#ffffff" stroke="#e0e0e0" stroke-width="0.5"/>
    <circle cx="68" cy="194" r="16" fill="#EEEDFE"/>
    <text x="68" y="199" font-size="11" font-weight="500" fill="#3C3489" text-anchor="middle" font-family="sans-serif">MS</text>
    <text x="92" y="189" font-size="12" font-weight="500" fill="#1a1a1a" font-family="sans-serif">M. Al-Soleiman</text>
    <text x="92" y="203" font-size="10" fill="#888" font-family="sans-serif">Full Stack Engineer</text>
    <text x="55" y="228" font-size="10" fill="#534AB7" font-family="monospace">@Mohammadsoleiman</text>
  </g>

  <!-- CARD MH -->
  <g class="g4">
    <rect x="240" y="166" width="185" height="72" rx="10" fill="#ffffff" stroke="#e0e0e0" stroke-width="0.5"/>
    <circle cx="268" cy="194" r="16" fill="#E1F5EE"/>
    <text x="268" y="199" font-size="11" font-weight="500" fill="#085041" text-anchor="middle" font-family="sans-serif">MH</text>
    <text x="292" y="189" font-size="12" font-weight="500" fill="#1a1a1a" font-family="sans-serif">M. Al-Hassan</text>
    <text x="292" y="203" font-size="10" fill="#888" font-family="sans-serif">Full Stack Engineer</text>
    <text x="255" y="228" font-size="10" fill="#0F6E56" font-family="monospace">@mhmdalhassan</text>
  </g>

  <!-- CARD HA -->
  <g class="g5">
    <rect x="440" y="166" width="200" height="72" rx="10" fill="#ffffff" stroke="#e0e0e0" stroke-width="0.5"/>
    <circle cx="468" cy="194" r="16" fill="#FAECE7"/>
    <text x="468" y="199" font-size="11" font-weight="500" fill="#712B13" text-anchor="middle" font-family="sans-serif">HA</text>
    <text x="492" y="189" font-size="12" font-weight="500" fill="#1a1a1a" font-family="sans-serif">Hassan Awad</text>
    <text x="492" y="203" font-size="10" fill="#888" font-family="sans-serif">Full Stack Engineer</text>
    <text x="455" y="228" font-size="10" fill="#993C1D" font-family="monospace">@Hassan222-pixel</text>
  </g>

  <line x1="40" y1="258" x2="640" y2="258" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- STACK -->
  <g class="g6">
    <text x="40" y="278" font-size="11" fill="#aaa" font-family="sans-serif" letter-spacing="1">STACK</text>

    <text x="40" y="300" font-size="11" fill="#555" font-family="monospace">React/Next.js</text>
    <rect x="160" y="288" width="240" height="10" rx="5" fill="#f0f0f0"/>
    <rect x="160" y="288" height="10" rx="5" fill="#378ADD" class="bar-ms"/>
    <text x="408" y="299" font-size="10" fill="#378ADD" font-family="monospace">92%</text>

    <text x="40" y="322" font-size="11" fill="#555" font-family="monospace">TypeScript</text>
    <rect x="160" y="310" width="240" height="10" rx="5" fill="#f0f0f0"/>
    <rect x="160" y="310" height="10" rx="5" fill="#534AB7" class="bar-mh"/>
    <text x="373" y="321" font-size="10" fill="#534AB7" font-family="monospace">85%</text>

    <text x="40" y="344" font-size="11" fill="#555" font-family="monospace">Flutter</text>
    <rect x="160" y="332" width="240" height="10" rx="5" fill="#f0f0f0"/>
    <rect x="160" y="332" height="10" rx="5" fill="#1D9E75" class="bar-ha"/>
    <text x="358" y="343" font-size="10" fill="#1D9E75" font-family="monospace">79%</text>
  </g>

  <line x1="40" y1="364" x2="640" y2="364" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- PRINCIPLES -->
  <g class="g7">
    <text x="40" y="384" font-size="11" fill="#aaa" font-family="sans-serif" letter-spacing="1">PRINCIPLES</text>
    <circle cx="52" cy="406" r="4" fill="#534AB7"/>
    <text x="62" y="410" font-size="12" font-weight="500" fill="#1a1a1a" font-family="sans-serif">Performance first</text>
    <circle cx="52" cy="428" r="4" fill="#1D9E75"/>
    <text x="62" y="432" font-size="12" font-weight="500" fill="#1a1a1a" font-family="sans-serif">Clean code</text>
    <circle cx="52" cy="450" r="4" fill="#D85A30"/>
    <text x="62" y="454" font-size="12" font-weight="500" fill="#1a1a1a" font-family="sans-serif">Ship it right</text>
  </g>

  <!-- FOOTER -->
  <g class="g7">
    <line x1="40" y1="476" x2="640" y2="476" stroke="#e0e0e0" stroke-width="0.5"/>
    <circle class="dot" cx="52" cy="496" r="4" fill="#1D9E75"/>
    <text x="62" y="500" font-size="11" fill="#888" font-family="sans-serif">active  •  Hash Labs  •  built with precision</text>
  </g>
</svg>
